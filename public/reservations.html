<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservas - UniReserva</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-brand">
      <img src="/assets/images/Logo_UniReserva.png" alt="Logo UniReserva" class="logo" />
      <div>
        <h1>UniReserva</h1>
        <p>Sistema de reserva de salas</p>
      </div>
    </div>
    <div class="hero-actions">
      <button id="theme-toggle" type="button" class="theme-toggle">Modo escuro</button>
      <p id="session-status" class="status"></p>
      <button id="logout-button" type="button" class="secondary-button" style="display: none;">Sair</button>
    </div>
  </header>

  <main class="grid">
    <section class="card">
      <h2>Salas disponíveis</h2>
      <div id="room-types" style="display: grid; gap: 10px;"></div>
    </section>

    <section class="card card-wide">
      <h2>Agendar reserva</h2>
      <form id="reservation-form">
        <div class="row">
          <div>
            <label for="date">Data</label>
            <input id="date" name="date" type="date" required />
          </div>
          <div>
            <label for="startTime">Início</label>
            <input id="startTime" name="startTime" type="time" value="19:00" required />
          </div>
          <div>
            <label for="endTime">Fim</label>
            <input id="endTime" name="endTime" type="time" value="20:00" required />
          </div>
        </div>
        <div class="row">
          <div style="flex: 1;">
            <label for="roomId">Sala disponível</label>
            <select id="roomId" name="roomId" required>
              <option value="">-- Selecione uma sala --</option>
            </select>
          </div>
        </div>
        <button type="submit">Reservar sala</button>
      </form>
      <p id="reservation-status" class="status"></p>
    </section>

    <section id="admin-room-panel" class="card card-wide" style="display: none;">
      <h2>Gerenciar salas (Administrador)</h2>
      <form id="room-form">
        <div class="row">
          <div>
            <label for="roomName">Nome da sala</label>
            <input id="roomName" name="name" type="text" required />
          </div>
          <div>
            <label for="roomCapacity">Capacidade</label>
            <input id="roomCapacity" name="capacity" type="number" min="1" required />
          </div>
          <div>
            <label for="roomType">Tipo</label>
            <input id="roomType" name="type" type="text" placeholder="laboratório, sala comum..." required />
          </div>
        </div>
        <button type="submit">Adicionar sala</button>
      </form>
      <p id="room-status" class="status"></p>
      <ul id="room-admin-list" class="list"></ul>
    </section>

    <section class="card card-wide">
      <h2 id="reservation-section-title">Minhas reservas</h2>
      <button id="load-reservations" type="button">Atualizar reservas</button>
      <ul id="reservation-list" class="list"></ul>
    </section>
  </main>

  <script src="theme.js"></script>
  <script src="reservations.js"></script>
</body>
</html>
