<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - UniReserva</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <img src="../assets/images/Logo_UniReserva.png" alt="Logo UniReserva" class="logo" />
    <div>
      <h1>UniReserva</h1>
      <p>Sistema de reserva de salas</p>
    </div>
  </header>

  <main class="grid">
    <section class="card">
      <h2>Entrar no Sistema</h2>
      <form id="login-form">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" value="professor@unireserva.com" required />

        <label for="password">Senha</label>
        <input id="password" name="password" type="password" value="prof123" required />

        <button type="submit">Fazer login</button>
      </form>
      <p id="login-status" class="status"></p>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
